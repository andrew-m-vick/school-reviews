<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>School Reviews</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #f5f4f0;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1rem 4rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    header .eyebrow {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 0.4rem;
    }
    header h1 {
      font-size: 26px;
      font-weight: 600;
      color: #1a1a1a;
      line-height: 1.3;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.25rem;
      width: 100%;
      max-width: 680px;
    }

    .subject-card {
      background: #fff;
      border: 1px solid #d8d6ce;
      border-radius: 12px;
      overflow: hidden;
    }

    .subject-header {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid #e2e0d8;
    }

    .subject-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .subject-title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .subject-count {
      margin-left: auto;
      font-size: 11px;
      font-weight: 500;
      border-radius: 999px;
      padding: 2px 9px;
    }

    .math .subject-dot  { background: #1D9E75; }
    .math .subject-title { color: #1D9E75; }
    .math .subject-count { background: #E8F5EE; color: #1D9E75; }

    .phil .subject-dot  { background: #534AB7; }
    .phil .subject-title { color: #534AB7; }
    .phil .subject-count { background: #EEEDFE; color: #534AB7; }

    .reviews-list {
      padding: 0.25rem 0;
    }

    .review-link {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.85rem 1.25rem;
      text-decoration: none;
      color: #1a1a1a;
      transition: background 0.12s;
    }

    .review-link:hover {
      background: #f5f4f0;
    }

    .review-link + .review-link {
      border-top: 1px solid #e2e0d8;
    }

    .review-info {
      flex: 1;
      min-width: 0;
    }

    .review-name {
      font-size: 15px;
      font-weight: 500;
      color: #1a1a1a;
    }

    .review-meta {
      font-size: 12px;
      color: #888;
      margin-top: 2px;
    }

    .review-arrow {
      font-size: 16px;
      color: #bbb9b2;
      flex-shrink: 0;
    }

    @media (max-width: 480px) {
      body { padding: 2rem 1rem; }
      header h1 { font-size: 22px; }
    }
  </style>
</head>
<body>
  <header>
    <p class="eyebrow">Study Tools</p>
    <h1>School Reviews</h1>
  </header>

  <div class="grid">

    <!-- Math -->
    <div class="subject-card math">
      <div class="subject-header">
        <div class="subject-dot"></div>
        <span class="subject-title">Math 1324</span>
        <span class="subject-count">9 sections</span>
      </div>
      <div class="reviews-list">
        <a class="review-link" href="/Math/index.html">
          <div class="review-info">
            <div class="review-name">Test 1</div>
            <div class="review-meta">Chapter 8 &amp; 9</div>
          </div>
          <span class="review-arrow">›</span>
        </a>
      </div>
    </div>

    <!-- Philosophy -->
    <div class="subject-card phil">
      <div class="subject-header">
        <div class="subject-dot"></div>
        <span class="subject-title">Phil 2306</span>
        <span class="subject-count">3 reviews</span>
      </div>
      <div class="reviews-list">
        <a class="review-link" href="/Phil/phil2306_quiz1_30q.html">
          <div class="review-info">
            <div class="review-name">Quiz 1 Practice</div>
            <div class="review-meta">30 questions</div>
          </div>
          <span class="review-arrow">›</span>
        </a>
        <a class="review-link" href="/Phil/phil2306_quiz2.html">
          <div class="review-info">
            <div class="review-name">Quiz 2 Practice</div>
            <div class="review-meta">30 questions</div>
          </div>
          <span class="review-arrow">›</span>
        </a>
        <a class="review-link" href="/Phil/phil2306_midterm_review.html">
          <div class="review-info">
            <div class="review-name">Midterm Review</div>
            <div class="review-meta">38 questions · all semester topics</div>
          </div>
          <span class="review-arrow">›</span>
        </a>
      </div>
    </div>

  </div>
</body>
</html>
