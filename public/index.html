<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>School Reviews</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #f5f4f0;
      --surface: #ffffff;
      --border: rgba(0,0,0,0.10);
      --border2: rgba(0,0,0,0.18);
      --text:   #1a1a1a;
      --text2:  #666;
      --accent-math: #1D9E75;
      --accent-phil: #534AB7;
      --r: 12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:      #1a1a18;
        --surface: #252523;
        --border:  rgba(255,255,255,0.10);
        --border2: rgba(255,255,255,0.18);
        --text:    #f0efe9;
        --text2:   #a0a09a;
      }
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1rem 4rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    header .eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text2);
      margin-bottom: 0.5rem;
    }
    header h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.25rem;
      width: 100%;
      max-width: 700px;
    }

    .subject-card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
    }

    .subject-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1.25rem 1.5rem;
      border-bottom: 0.5px solid var(--border);
    }

    .subject-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .subject-title {
      font-size: 15px;
      font-weight: 600;
    }

    .subject-count {
      margin-left: auto;
      font-size: 12px;
      font-weight: 500;
      color: var(--text2);
      background: var(--bg);
      border: 0.5px solid var(--border2);
      border-radius: 20px;
      padding: 2px 9px;
    }

    .reviews-list {
      padding: 0.5rem 0;
    }

    .review-link {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.85rem 1.5rem;
      text-decoration: none;
      color: var(--text);
      transition: background 0.12s;
    }

    .review-link:hover {
      background: var(--bg);
    }

    .review-link + .review-link {
      border-top: 0.5px solid var(--border);
    }

    .review-icon {
      font-size: 16px;
      flex-shrink: 0;
      opacity: 0.6;
    }

    .review-info {
      flex: 1;
      min-width: 0;
    }

    .review-name {
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .review-meta {
      font-size: 12px;
      color: var(--text2);
      margin-top: 2px;
    }

    .review-arrow {
      font-size: 13px;
      color: var(--text2);
      flex-shrink: 0;
    }

    /* per-subject accent colours */
    .math .subject-dot  { background: var(--accent-math); }
    .math .subject-title { color: var(--accent-math); }

    .phil .subject-dot  { background: var(--accent-phil); }
    .phil .subject-title { color: var(--accent-phil); }
  </style>
</head>
<body>
  <header>
    <p class="eyebrow">Study Tools</p>
    <h1>School Reviews</h1>
  </header>

  <div class="grid">

    <!-- Math -->
    <div class="subject-card math">
      <div class="subject-header">
        <div class="subject-dot"></div>
        <span class="subject-title">Math 1324</span>
        <span class="subject-count">2 reviews</span>
      </div>
      <div class="reviews-list">
        <a class="review-link" href="/Math/math_1324_review_v2.html">
          <span class="review-icon">📋</span>
          <div class="review-info">
            <div class="review-name">Math 1324 Review</div>
            <div class="review-meta">General review · v2</div>
          </div>
          <span class="review-arrow">›</span>
        </a>
        <a class="review-link" href="/Math/math1324_ch9_review_v2.html">
          <span class="review-icon">📋</span>
          <div class="review-info">
            <div class="review-name">Chapter 9 Review</div>
            <div class="review-meta">Math 1324 · v2</div>
          </div>
          <span class="review-arrow">›</span>
        </a>
      </div>
    </div>

    <!-- Philosophy -->
    <div class="subject-card phil">
      <div class="subject-header">
        <div class="subject-dot"></div>
        <span class="subject-title">Phil 2306</span>
        <span class="subject-count">1 review</span>
      </div>
      <div class="reviews-list">
        <a class="review-link" href="/Phil/phil2306_quiz1_30q.html">
          <span class="review-icon">📝</span>
          <div class="review-info">
            <div class="review-name">Quiz 1 Practice</div>
            <div class="review-meta">30 questions</div>
          </div>
          <span class="review-arrow">›</span>
        </a>
      </div>
    </div>

  </div>
</body>
</html>
