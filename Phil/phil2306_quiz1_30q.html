<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PHIL 2306 — Quiz 1 Practice (30 Questions)</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #f5f4f0;
      color: #1a1a1a;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .quiz-wrap { max-width: 640px; margin: 0 auto; }

    .back-link { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: #888; text-decoration: none; margin-bottom: 1.25rem; }
    .back-link:hover { color: #1a1a1a; }

    header { margin-bottom: 2rem; }
    header .eyebrow {
      font-size: 12px; font-weight: 500; letter-spacing: 0.08em;
      text-transform: uppercase; color: #534AB7; margin-bottom: 0.4rem;
    }
    header h1 { font-size: 22px; font-weight: 600; color: #1a1a1a; line-height: 1.3; }
    header p { font-size: 14px; color: #666; margin-top: 0.35rem; }

    .progress-bar-bg {
      background: #e2e0d8; border-radius: 999px; height: 5px;
      margin-bottom: 1.5rem; overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%; background: #7F77DD; border-radius: 999px; transition: width 0.4s ease;
    }

    .q-counter { font-size: 13px; color: #888; margin-bottom: 0.5rem; }
    .q-topic-badge {
      display: inline-block; font-size: 11px; font-weight: 500; letter-spacing: 0.05em;
      text-transform: uppercase; background: #EEEDFE; color: #534AB7;
      padding: 3px 10px; border-radius: 999px; margin-bottom: 0.75rem;
    }
    .q-text {
      font-size: 17px; font-weight: 500; color: #1a1a1a;
      line-height: 1.55; margin-bottom: 1.25rem;
    }

    .options-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 1.5rem; }
    .option-btn {
      text-align: left; padding: 0.75rem 1rem; border: 1px solid #d8d6ce;
      border-radius: 12px; background: #fff; color: #1a1a1a; font-size: 15px;
      font-family: inherit; cursor: pointer; transition: background 0.15s, border-color 0.15s;
      line-height: 1.45;
    }
    .option-btn:hover:not(:disabled) { background: #f0eeea; border-color: #bbb9b2; }
    .option-btn.correct { background: #EAF3DE; border-color: #639922; color: #27500A; }
    .option-btn.wrong   { background: #FCEBEB; border-color: #E24B4A; color: #791F1F; }
    .option-btn.reveal  { background: #EAF3DE; border-color: #639922; color: #27500A; }
    .option-btn:disabled { cursor: default; }

    .feedback-box {
      padding: 0.875rem 1rem; border-radius: 8px; font-size: 14px;
      line-height: 1.6; margin-bottom: 1.25rem;
    }
    .feedback-box.correct { background: #EAF3DE; color: #27500A; border: 1px solid #97C459; }
    .feedback-box.wrong   { background: #FCEBEB; color: #791F1F; border: 1px solid #F09595; }
    .feedback-box strong  { display: block; margin-bottom: 0.3rem; }

    .next-btn {
      padding: 0.6rem 1.5rem; border: 1px solid #bbb9b2; border-radius: 8px;
      background: #fff; color: #1a1a1a; font-size: 15px; font-family: inherit; cursor: pointer;
    }
    .next-btn:hover { background: #f0eeea; }

    .score-card { text-align: center; padding: 2rem 1rem; }
    .score-big { font-size: 56px; font-weight: 600; color: #7F77DD; line-height: 1; }
    .score-label { font-size: 15px; color: #666; margin-top: 0.4rem; margin-bottom: 1.75rem; }

    .score-breakdown {
      text-align: left; background: #eeece7; border-radius: 12px;
      padding: 1rem 1.25rem; margin-bottom: 1.5rem;
    }
    .breakdown-section-title {
      font-size: 11px; font-weight: 500; letter-spacing: 0.07em; text-transform: uppercase;
      color: #888; margin: 0.75rem 0 0.4rem; padding-top: 0.75rem;
      border-top: 1px solid #dddbd3;
    }
    .breakdown-section-title:first-child { margin-top: 0; padding-top: 0; border-top: none; }
    .breakdown-row {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 14px; padding: 5px 0; border-bottom: 1px solid #dddbd3;
    }
    .breakdown-row:last-child { border-bottom: none; }
    .breakdown-row .topic { color: #555; }
    .result-correct { color: #3B6D11; font-weight: 500; }
    .result-wrong   { color: #A32D2D; font-weight: 500; }

    .restart-btn {
      padding: 0.65rem 2rem; border: 1px solid #7F77DD; border-radius: 8px;
      background: #fff; color: #534AB7; font-size: 15px; font-family: inherit; cursor: pointer;
    }
    .restart-btn:hover { background: #EEEDFE; }

    @media (max-width: 480px) {
      body { padding: 2rem 1rem; }
      .q-text { font-size: 16px; }
      .option-btn { font-size: 14px; }
    }
  </style>

<script>
const questions = [

  // ── HOBBES ──────────────────────────────────────────────────────────────
  {
    topic: "Hobbes — State of Nature",
    q: "According to Hobbes, what is life like for humans in the State of Nature?",
    options: [
      "Peaceful and cooperative, because humans are naturally social",
      "Solitary, poor, nasty, brutish, and short",
      "Governed by natural law and reason",
      "Comfortable, since resources are abundant"
    ],
    answer: 1,
    explanation: "Hobbes describes the State of Nature as a 'war of all against all.' Without governing authority, life is solitary, poor, nasty, brutish, and short — the direct result of human self-interest and rough equality in ability producing constant conflict."
  },
  {
    topic: "Hobbes — State of Nature",
    q: "Which of the following best describes why conflict is inevitable in Hobbes' State of Nature?",
    options: [
      "Humans are born evil and incapable of reason",
      "Resources are infinite, so people fight over status alone",
      "Humans are roughly equal in ability, so no one can dominate permanently and all must compete",
      "A divine force compels humans to war"
    ],
    answer: 2,
    explanation: "A key part of Hobbes' argument is that humans are roughly equal in physical and mental ability. No one is so superior they can be safe forever, so everyone must compete and preemptively defend themselves — making perpetual conflict rational."
  },
  {
    topic: "Hobbes — State of Nature",
    q: "For Hobbes, what is the primary purpose of the social contract?",
    options: [
      "To promote individual freedom above all else",
      "To ensure economic equality among citizens",
      "To escape the State of Nature by creating a sovereign authority that maintains peace",
      "To honor the divine right of kings"
    ],
    answer: 2,
    explanation: "Hobbes argues that rational self-interest leads people to agree to a social contract, surrendering some freedoms to a sovereign authority (the Leviathan) whose job is to prevent the war of all against all and maintain peace."
  },

  // ── HOBBES HUMAN NATURE ─────────────────────────────────────────────────
  {
    topic: "Hobbes — Human Nature",
    q: "Which of the following best captures Hobbes' core assumption about human nature?",
    options: [
      "Humans are naturally benevolent and cooperative",
      "Humans are fundamentally self-interested and driven by desire for power",
      "Humans are indifferent to both others and themselves",
      "Humans naturally defer to moral law"
    ],
    answer: 1,
    explanation: "Hobbes assumes humans are primarily self-interested, motivated by self-preservation and the accumulation of power. This is what makes the State of Nature so dangerous and necessitates a sovereign authority."
  },
  {
    topic: "Hobbes — Human Nature",
    q: "True or False: Hobbes believed humans are naturally peaceful and only become violent due to social corruption.",
    options: [
      "True — Hobbes thought society corrupts naturally peaceful humans",
      "False — Hobbes thought conflict arises from human nature itself, not social corruption",
      "True — Hobbes agreed with Rousseau on this point",
      "False — Hobbes thought humans are peaceful only under a monarch"
    ],
    answer: 1,
    explanation: "False. This is actually closer to Rousseau's view. Hobbes believed conflict is rooted in human nature itself — self-interest and the desire for power — not in social institutions. Society (via the sovereign) is the solution, not the problem."
  },
  {
    topic: "Hobbes — Human Nature",
    q: "According to Hobbes, in the State of Nature there is no such thing as:",
    options: [
      "Violence or aggression",
      "Justice or injustice — morality requires a sovereign to enforce it",
      "Self-interest or desire",
      "Fear of death"
    ],
    answer: 1,
    explanation: "For Hobbes, moral concepts like justice and injustice only have meaning within a political society where a sovereign enforces laws. In the State of Nature, there is no common authority, so there is no justice or injustice — only power."
  },

  // ── NIETZSCHE — GOD IS DEAD ─────────────────────────────────────────────
  {
    topic: "Nietzsche — 'God is Dead'",
    q: "When Nietzsche's Madman declares 'God is dead,' he most directly means:",
    options: [
      "God never existed in the first place",
      "Organized religion is losing membership",
      "The cultural and moral authority of God has been destroyed by modern thought",
      "Science has empirically disproven the existence of God"
    ],
    answer: 2,
    explanation: "'God is dead' is a cultural, not a theological, claim. Nietzsche means that the Enlightenment and modern rationalism have undermined the foundations that gave God — and the moral order built on Him — their authority."
  },
  {
    topic: "Nietzsche — 'God is Dead'",
    q: "Why does Nietzsche use a 'Madman' as the one who announces God's death?",
    options: [
      "To suggest the claim is literally insane and should be dismissed",
      "Because only a madman would believe in God",
      "To highlight that the insight is so radical that most people aren't ready to grasp it",
      "To show that atheism leads to mental illness"
    ],
    answer: 2,
    explanation: "The Madman represents someone who perceives a profound truth that the rest of society has not yet caught up to. His 'madness' is really a kind of visionary clarity — the crowd laughs at him because they haven't grasped the full implications of the death of God."
  },
  {
    topic: "Nietzsche — 'God is Dead'",
    q: "True or False: Nietzsche's 'God is dead' is primarily a claim about the non-existence of God.",
    options: [
      "True — Nietzsche is making a metaphysical argument that God doesn't exist",
      "False — it is primarily a cultural claim about the collapse of God's authority as the foundation of values",
      "True — Nietzsche was a committed atheist making a logical argument",
      "False — Nietzsche was actually defending religion"
    ],
    answer: 1,
    explanation: "False. The statement is not primarily metaphysical. It is a diagnosis of Western culture: the Enlightenment has eroded the credibility of God as the source of moral and cosmic authority, regardless of whether God 'exists' in an abstract sense."
  },

  // ── NIETZSCHE — WE HAVE KILLED HIM ─────────────────────────────────────
  {
    topic: "Nietzsche — 'We have killed Him'",
    q: "When Nietzsche says 'we have killed Him,' who does 'we' refer to?",
    options: [
      "Atheist philosophers and scientists specifically",
      "Western civilization as a whole, through the rise of reason and secularism",
      "The Church, through its own corruption",
      "Political revolutionaries who rejected the old order"
    ],
    answer: 1,
    explanation: "Nietzsche implicates all of Western civilization — even believers — because the culture as a whole progressively shifted toward rationalism, science, and secularism, collectively eroding the foundations that gave God His authority."
  },
  {
    topic: "Nietzsche — 'We have killed Him'",
    q: "Nietzsche says 'we have killed Him' — what does this suggest about how God's authority ended?",
    options: [
      "It was a sudden, violent political revolution",
      "It was a gradual cultural process driven by the rise of science and reason",
      "It was caused by a single philosopher's argument",
      "It happened because people simply stopped attending church"
    ],
    answer: 1,
    explanation: "For Nietzsche, God's death was not a sudden event but a slow cultural erosion — the cumulative result of the Enlightenment, the Scientific Revolution, and modernity's faith in reason over revelation. It was a civilizational shift, not a moment."
  },
  {
    topic: "Nietzsche — 'We have killed Him'",
    q: "Nietzsche's tone in the Madman passage when announcing God's death is best described as:",
    options: [
      "Triumphant and celebratory",
      "Indifferent and clinical",
      "Anxious and alarmed — this is a catastrophe, not a victory",
      "Sarcastic and mocking toward believers"
    ],
    answer: 2,
    explanation: "Nietzsche's tone is one of alarm. The Madman is not celebrating — he is horrified that this enormous event has happened and that almost no one has registered its consequences. The death of God is a crisis, not a liberation, in this passage."
  },

  // ── NIETZSCHE — ULTIMATE CONCERN ────────────────────────────────────────
  {
    topic: "Nietzsche — Ultimate Concern",
    q: "What is Nietzsche's ultimate concern in the 'Madman' passage?",
    options: [
      "That society will collapse into political violence",
      "That people will fail to recognize the gravity of what has been lost — a foundation for morality and meaning",
      "That science will cleanly and positively replace religion",
      "That God's death will lead to greater individual freedom"
    ],
    answer: 1,
    explanation: "Nietzsche is alarmed that humans have destroyed the foundation of their entire value system without recognizing the enormity of it. Without God as the source of moral authority, what replaces Him? He fears a collapse into nihilism and meaninglessness."
  },
  {
    topic: "Nietzsche — Ultimate Concern",
    q: "The 'danger' Nietzsche warns about after God's death is best described as:",
    options: [
      "Theocracy replacing democracy",
      "Moral nihilism — the collapse of any basis for values or meaning",
      "Science becoming a new religion",
      "Individual selfishness replacing communal values"
    ],
    answer: 1,
    explanation: "Nietzsche's deepest worry is nihilism: if God was the foundation of all values and meaning, and God is dead, then values and meaning themselves are in danger of collapsing. Society risks drifting into a purposeless, valueless existence."
  },
  {
    topic: "Nietzsche — Ultimate Concern",
    q: "True or False: Nietzsche wrote the Madman passage to encourage people to embrace atheism confidently.",
    options: [
      "True — Nietzsche saw atheism as a straightforwardly positive development",
      "False — Nietzsche was warning that losing God without finding a replacement for meaning is a crisis",
      "True — the Madman is a heroic figure celebrating liberation",
      "False — Nietzsche was secretly defending Christianity"
    ],
    answer: 1,
    explanation: "False. Nietzsche was not cheerleading for atheism. He saw the death of God as inevitable but terrifying — a cultural catastrophe that demands humans find a new foundation for values. His concern was the vacuum left behind, not the liberation gained."
  },

  // ── TYPES OF VALUES ─────────────────────────────────────────────────────
  {
    topic: "Types of Values",
    q: "Which type of value is considered the most important — the one that overrides all others?",
    options: [
      "Legal values",
      "Prudential values",
      "Etiquette values",
      "Moral values"
    ],
    answer: 3,
    explanation: "Moral values are the most important and overriding. When moral obligations conflict with legal, prudential, or etiquette norms, morality takes precedence. Civil disobedience, for example, can be morally justified even when it violates the law."
  },
  {
    topic: "Types of Values",
    q: "Prudential values are best defined as values related to:",
    options: [
      "What is legally required by the state",
      "What is in one's own self-interest or well-being",
      "What polite society expects in social situations",
      "What God commands us to do"
    ],
    answer: 1,
    explanation: "Prudential values concern what is good or beneficial for the individual — self-interest, well-being, and practical wisdom about one's own life. They are distinct from moral values, which concern what is right regardless of personal benefit."
  },
  {
    topic: "Types of Values",
    q: "A person who lies under oath in court is violating which type(s) of values?",
    options: [
      "Etiquette values only",
      "Prudential values only",
      "Both legal and moral values",
      "Moral values only, since courts are a human institution"
    ],
    answer: 2,
    explanation: "Perjury violates legal values (it is a crime) and moral values (lying, especially to pervert justice, is morally wrong). This illustrates how different value types can overlap and be violated simultaneously."
  },

  // ── COMPONENTS OF MORAL CLAIMS ──────────────────────────────────────────
  {
    topic: "Components of Moral Claims",
    q: "Which of the following is NOT one of the four components of moral claims?",
    options: [
      "Normative",
      "Universal",
      "Empirical",
      "Overriding"
    ],
    answer: 2,
    explanation: "The four components of moral claims are: normative (prescribing how things ought to be), truth (moral claims are either true or false), universal (applying to all people), and overriding (taking priority over other values). 'Empirical' is not one of them."
  },
  {
    topic: "Components of Moral Claims",
    q: "The 'universal' component of moral claims means that moral judgments:",
    options: [
      "Apply only to the person making them",
      "Apply to everyone in the same situation, regardless of who they are",
      "Must be agreed upon by a majority vote",
      "Are valid only within a specific culture"
    ],
    answer: 1,
    explanation: "Universality means that if something is morally wrong, it is wrong for everyone in the same situation — not just for the person making the claim, and not just for one culture. This is what distinguishes moral claims from mere personal preferences."
  },
  {
    topic: "Components of Moral Claims",
    q: "The 'normative' component of a moral claim means the claim is:",
    options: [
      "Based on scientific fact",
      "A description of what people actually do",
      "A prescription about what ought to be done",
      "Relative to cultural norms"
    ],
    answer: 2,
    explanation: "Normative claims are prescriptive — they say what ought to be, not what is. 'Stealing is wrong' is normative: it doesn't describe what people do, it says what they should do. This contrasts with descriptive or empirical claims about how things are."
  },

  // ── RELATIVISM / ABSOLUTISM / OBJECTIVISM / NIHILISM ────────────────────
  {
    topic: "Ethical Relativism vs. Absolutism",
    q: "Ethical Relativism holds that moral truths:",
    options: [
      "Are universal and apply to all people regardless of culture",
      "Vary depending on culture, society, or individual perspective",
      "Are completely unknowable",
      "Are determined solely by rational reasoning"
    ],
    answer: 1,
    explanation: "Ethical Relativism holds that moral truths depend on cultural, societal, or individual context — there are no universal standards. This contrasts with Absolutism, which holds that certain moral rules apply to everyone, always, regardless of culture."
  },
  {
    topic: "Ethical Relativism vs. Absolutism",
    q: "An Ethical Absolutist would most likely say:",
    options: [
      "'Torture is wrong in my culture, but might be acceptable in another'",
      "'Torture is wrong, period — for everyone, in all times and places'",
      "'Whether torture is wrong depends on the consequences'",
      "'We can never know if torture is wrong'"
    ],
    answer: 1,
    explanation: "Ethical Absolutism holds that some moral rules are universally and unconditionally true — they apply to all people everywhere, regardless of culture or circumstance. A true absolutist would say torture is wrong without exception."
  },
  {
    topic: "Ethical Nihilism vs. Objectivism",
    q: "What most accurately distinguishes Ethical Nihilism from Ethical Relativism?",
    options: [
      "Nihilism says morality varies by culture; Relativism says morality doesn't exist at all",
      "Nihilism holds that moral claims have no truth value at all; Relativism holds that moral truth is culture-dependent",
      "Nihilism is more optimistic about human nature than Relativism",
      "There is no meaningful distinction between the two"
    ],
    answer: 1,
    explanation: "Ethical Nihilism denies that moral claims have any truth value — morality is not just relative, it is entirely meaningless. Ethical Relativism does allow for moral truths, but only relative to a given culture or individual. Nihilism is the more radical position."
  },
  {
    topic: "Ethical Nihilism vs. Objectivism",
    q: "Ethical Objectivism holds that moral truths:",
    options: [
      "Are invented by each society and have no independent status",
      "Do not exist at all",
      "Exist independently of what any individual or culture believes",
      "Are true only for those who believe in them"
    ],
    answer: 2,
    explanation: "Ethical Objectivism holds that moral truths are real and independent — they exist regardless of whether any individual or culture recognizes them. This contrasts with both Relativism (truth is culture-dependent) and Nihilism (no moral truth exists)."
  },
  {
    topic: "Ethical Nihilism vs. Objectivism",
    q: "Which position would argue that saying 'murder is wrong' is literally neither true nor false?",
    options: [
      "Ethical Absolutism",
      "Ethical Objectivism",
      "Ethical Relativism",
      "Ethical Nihilism"
    ],
    answer: 3,
    explanation: "Ethical Nihilism denies that moral claims have any truth value whatsoever — they are neither true nor false, because morality itself is an illusion or a fiction. This is the most extreme denial of moral realism."
  },

  // ── EGOISM VS. ALTRUISM ──────────────────────────────────────────────────
  {
    topic: "Ethical Egoism vs. Altruism",
    q: "Ethical Egoism is the view that:",
    options: [
      "People should always put others before themselves",
      "People ought to act in their own self-interest",
      "People naturally act selfishly but shouldn't",
      "Self-interest and altruism should be balanced equally"
    ],
    answer: 1,
    explanation: "Ethical Egoism is a normative theory — it says people ought to act in their own self-interest. It is not merely a description of how people behave (that would be psychological egoism), but a prescription for how they should behave."
  },
  {
    topic: "Ethical Egoism vs. Altruism",
    q: "Ethical Altruism holds that:",
    options: [
      "One's primary moral obligation is to act for the benefit of others",
      "Self-interest should be the only guide to action",
      "Moral rules apply only when they benefit the individual",
      "Helping others is good, but only when it also helps yourself"
    ],
    answer: 0,
    explanation: "Ethical Altruism holds that the morally correct action is the one that benefits others, even at cost to oneself. It places the welfare of others as the primary moral obligation — the direct opposite of Ethical Egoism."
  },
  {
    topic: "Ethical Egoism vs. Altruism",
    q: "True or False: Ethical Egoism says people do act selfishly; Ethical Altruism says people should act for others.",
    options: [
      "True — one is descriptive, the other is prescriptive",
      "False — both are normative theories about how people ought to act",
      "True — Egoism is a factual claim and Altruism is a moral claim",
      "False — both are purely descriptive theories about human behavior"
    ],
    answer: 1,
    explanation: "False. Both Ethical Egoism and Ethical Altruism are normative theories — they both prescribe how people ought to act. Egoism says you ought to pursue self-interest; Altruism says you ought to prioritize others. Neither is simply describing behavior."
  },

  // ── AYN RAND ─────────────────────────────────────────────────────────────
  {
    topic: "Ayn Rand — Egoism vs. Altruism",
    q: "Ayn Rand's ethical position is that:",
    options: [
      "Altruism is the foundation of a just society",
      "Rational self-interest (Ethical Egoism) is the proper moral framework",
      "People should balance egoism and altruism equally",
      "Moral behavior requires sacrificing the self for the collective"
    ],
    answer: 1,
    explanation: "Ayn Rand is a famous defender of Ethical Egoism. In 'The Virtue of Selfishness,' she argues that rational self-interest is a virtue, and that altruism — acting for others at one's own expense — is harmful and immoral."
  },
  {
    topic: "Ayn Rand — Egoism vs. Altruism",
    q: "Rand's view of altruism is best described as:",
    options: [
      "A noble ideal that is unfortunately impractical",
      "A moral obligation every person shares",
      "A destructive doctrine that degrades the individual by demanding self-sacrifice",
      "A private virtue that should not be legislated"
    ],
    answer: 2,
    explanation: "For Rand, altruism is not just impractical — it is morally wrong. She argues that demanding self-sacrifice treats individuals as means to others' ends, which destroys the individual. Her philosophy (Objectivism) holds that each person's own life is their highest value."
  },
  {
    topic: "Ayn Rand — Egoism vs. Altruism",
    q: "Which ethical framework does Ayn Rand's philosophy most directly oppose?",
    options: [
      "Ethical Egoism",
      "Ethical Nihilism",
      "Ethical Altruism",
      "Ethical Relativism"
    ],
    answer: 2,
    explanation: "Rand most directly opposes Ethical Altruism. Her entire philosophical project (Objectivism) is in large part a systematic argument against the altruistic tradition — she sees the demand to live for others as the central moral error of Western civilization."
  }

];

let current = 0;
let score = 0;
let answered = false;
let results = [];
let shuffledQs = [];

function shuffle(arr) {
  return arr.slice().sort(() => Math.random() - 0.5);
}

function render() {
  const area = document.getElementById('quiz-area');
  if (current >= shuffledQs.length) { renderScore(area); return; }
  const q = shuffledQs[current];
  const progress = (current / shuffledQs.length) * 100;
  area.innerHTML = `
    <div class="q-counter">Question ${current + 1} of ${shuffledQs.length}</div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${progress}%"></div></div>
    <div class="q-topic-badge">${q.topic}</div>
    <div class="q-text">${q.q}</div>
    <div class="options-list" id="opts">
      ${q.options.map((opt, i) => `<button class="option-btn" id="opt-${i}" onclick="choose(${i})">${opt}</button>`).join('')}
    </div>
    <div id="feedback"></div>
  `;
}

function choose(idx) {
  if (answered) return;
  answered = true;
  const q = shuffledQs[current];
  const correct = idx === q.answer;
  if (correct) score++;
  results.push({ topic: q.topic, q: q.q, correct });

  q.options.forEach((_, i) => {
    const btn = document.getElementById('opt-' + i);
    btn.disabled = true;
    if (i === q.answer) btn.classList.add(correct ? 'correct' : 'reveal');
    if (i === idx && !correct) btn.classList.add('wrong');
  });

  document.getElementById('feedback').innerHTML = `
    <div class="feedback-box ${correct ? 'correct' : 'wrong'}">
      <strong>${correct ? '✓ Correct' : '✗ Incorrect'}</strong>
      ${q.explanation}
    </div>
    <button class="next-btn" onclick="next()">${current + 1 < shuffledQs.length ? 'Next question →' : 'See results →'}</button>
  `;
}

function next() {
  current++;
  answered = false;
  render();
}

function renderScore(area) {
  const pct = Math.round((score / shuffledQs.length) * 100);
  const verdict = pct >= 90 ? "Excellent — you're ready for quiz day."
    : pct >= 75 ? "Strong. Review the topics you missed and you're set."
    : pct >= 60 ? "Solid foundation — keep drilling the weak spots."
    : "Keep studying — focus on the topics below.";

  // Group by topic
  const topicMap = {};
  results.forEach(r => {
    if (!topicMap[r.topic]) topicMap[r.topic] = { correct: 0, total: 0 };
    topicMap[r.topic].total++;
    if (r.correct) topicMap[r.topic].correct++;
  });

  const rows = Object.entries(topicMap).map(([topic, data]) => {
    const allCorrect = data.correct === data.total;
    const label = `${data.correct}/${data.total}`;
    return `
      <div class="breakdown-row">
        <span class="topic">${topic}</span>
        <span class="${allCorrect ? 'result-correct' : 'result-wrong'}">${label}</span>
      </div>`;
  }).join('');

  area.innerHTML = `
    <div class="score-card">
      <div class="score-big">${score}/${shuffledQs.length}</div>
      <div class="score-label">${pct}% — ${verdict}</div>
      <div class="score-breakdown">${rows}</div>
      <button class="restart-btn" onclick="restart()">Retake quiz</button>
    </div>
  `;
}

function restart() {
  current = 0; score = 0; answered = false; results = [];
  shuffledQs = shuffle(questions);
  render();
}

shuffledQs = shuffle(questions);
render();
</script>
