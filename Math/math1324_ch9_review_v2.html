const SECTIONS=["All","§9.1 — Probability Distributions","§9.2 — Counting Principles","§9.3 — Probability with Counting","§9.4 — Binomial Probability"];
const LABELS={"All":"All","§9.1 — Probability Distributions":"§9.1 Distributions","§9.2 — Counting Principles":"§9.2 Counting","§9.3 — Probability with Counting":"§9.3 Prob+Counting","§9.4 — Binomial Probability":"§9.4 Binomial"};

let filtered=[...Q],current=0,activeFilter="All",roundNum=1,history=[],state={},scores={correct:0,attempted:0};

function norm(s){return s.toLowerCase().trim().replace(/,/g,"").replace(/\s/g,"");}
function checkFree(u,c){
  if(norm(u)===norm(c))return true;
  const uN=parseFloat(u.replace(/,/g,"")),cN=parseFloat(c.replace(/,/g,""));
  if(!isNaN(uN)&&!isNaN(cN))return Math.abs(uN-cN)<0.005;
  return false;
}
function key(i){return activeFilter+"||"+roundNum+"||"+i;}
function done(i){const s=state[key(i)];return s&&s.done;}
function allDone(){return filtered.length>0&&filtered.every((_,i)=>done(i));}

function updateStats(){
  document.getElementById("s-correct").textContent=scores.correct;
  document.getElementById("s-attempted").textContent=scores.attempted;
  document.getElementById("s-pct").textContent=scores.attempted>0?Math.round(scores.correct/scores.attempted*100)+"%":"—";
  document.getElementById("s-round").textContent=roundNum;
  const d=filtered.filter((_,i)=>done(i)).length;
  document.getElementById("prog").style.width=(filtered.length?Math.round(d/filtered.length*100):0)+"%";
  if(allDone()){
    const pct=Math.round(scores.correct/scores.attempted*100);
    if(!history.find(r=>r.round===roundNum&&r.filter===activeFilter)){
      history.push({round:roundNum,filter:activeFilter,correct:scores.correct,attempted:scores.attempted,pct});
      showHistory();showBanner(pct);
      document.getElementById("btn-redo").style.display="inline-block";
    }
  }
}

function showHistory(){
  const panel=document.getElementById("history-panel"),row=document.getElementById("history-row");
  const rel=history.filter(r=>r.filter===activeFilter);
  if(!rel.length){panel.style.display="none";return;}
  panel.style.display="block";row.innerHTML="";
  const best=Math.max(...rel.map(r=>r.pct));
  rel.forEach(r=>{
    const c=document.createElement("span");
    c.className="hchip"+(r.pct===best?" best":"");
    c.textContent="Round "+r.round+": "+r.correct+"/"+r.attempted+" ("+r.pct+"%)";
    row.appendChild(c);
  });
}

function showBanner(pct){
  document.getElementById("banner").style.display="block";
  document.getElementById("banner-title").textContent="Round "+roundNum+" complete!";
  document.getElementById("banner-msg").textContent=pct===100?"Perfect score! Try another round to cement it.":pct>=80?"Great work — "+pct+"%. Another round will lock it in.":pct>=60?pct+"% — review the worked solutions on missed questions, then retry.":pct+"% — go through the 'how to solve' guides carefully, then try again.";
}

function newRound(){
  roundNum++;scores={correct:0,attempted:0};current=0;
  document.getElementById("banner").style.display="none";
  document.getElementById("btn-redo").style.display="none";
  renderQ();updateStats();showHistory();
}

function renderQ(){
  if(!filtered.length){document.getElementById("q-area").innerHTML='<p style="color:var(--text2);font-size:14px;padding:1rem 0;">No questions in this section.</p>';return;}
  const q=filtered[current];
  const k=key(current);
  const s=state[k]||{attempts:0,done:false,wrongChoices:[],feedbackMsg:"",feedbackColor:""};
  document.getElementById("qcounter").textContent=(current+1)+" / "+filtered.length;

  let attTag=s.attempts>0?`<span class="atag">(${s.attempts} attempt${s.attempts>1?"s":""})</span>`:"";
  let html=`<div class="qcard">
    <div><span class="stag">${q.section}</span>${attTag}</div>
    <p class="qtext">${q.q}</p>`;

  if(q.type==="mc"){
    html+=`<div class="options">`;
    q.options.forEach((opt,i)=>{
      let cls="obtn",dis="";
      if(s.done){if(opt===q.answer)cls+=" reveal-correct";else if(s.wrongChoices.includes(opt))cls+=" dwrong";dis="disabled";}
      else if(s.wrongChoices.includes(opt)){cls+=" dwrong";dis="disabled";}
      html+=`<button class="${cls}" data-opt="${i}" ${dis}>${opt}</button>`;
    });
    html+=`</div>`;
  } else {
    html+=`<div class="free-row">
      <input type="text" id="free-in" placeholder="Type your answer and press Enter…" ${s.done?"disabled":""} value="${s.done?(s.lastVal||""):""}">
      ${!s.done?`<button class="abtn" id="btn-submit">check</button>`:""}
    </div>`;
  }

  html+=`<div class="btn-row"><button class="abtn" id="btn-hint">💡 how to solve</button></div>`;

  const h=q.hint;
  html+=`<div class="hint-box" id="hint-box">
    <h4>💡 How to Approach This Problem</h4>
    <div class="hint-concept"><strong>Key Concept:</strong> ${h.concept}</div>
    <strong style="font-size:13px;color:var(--text-hint);">Step-by-step approach:</strong>
    <ol class="hint-steps">`;
  h.steps.forEach(st=>{html+=`<li>${st}</li>`;});
  html+=`</ol>`;
  if(h.note)html+=`<div class="hint-note">💬 ${h.note}</div>`;
  html+=`</div>`;

  if(s.done&&s.wrongChoices.length>=2){
    const sol=q.solution;
    html+=`<div class="solution-box" style="display:block">
      <h4>📝 Full Worked Solution</h4>`;
    sol.steps.forEach(st=>{html+=`<div class="sol-step">${st}</div>`;});
    html+=`<div class="sol-answer">✓ Answer: ${q.answer}</div></div>`;
  }

  html+=`<div class="feedback" id="feedback" style="display:${s.feedbackMsg?"block":"none"};color:${s.feedbackColor||"inherit"}">${s.feedbackMsg||""}</div>`;
  html+=`</div>`;

  document.getElementById("q-area").innerHTML=html;

  document.getElementById("btn-hint").onclick=()=>{
    const hb=document.getElementById("hint-box");
    hb.style.display=hb.style.display==="block"?"none":"block";
  };

  function showFeedback(msg,type){
    const fb=document.getElementById("feedback");
    fb.style.display="block";
    const colors={correct:"var(--text-success)",tryagain:"var(--text-warning)",wrong:"var(--text-danger)"};
    fb.style.color=colors[type];
    fb.textContent=type==="correct"?"✓ Correct! Well done.":msg;
    state[k].feedbackMsg=fb.textContent;state[k].feedbackColor=fb.style.color;
  }

  function handleAnswer(chosen,correct){
    if(!state[k])state[k]={attempts:0,done:false,wrongChoices:[],feedbackMsg:"",feedbackColor:""};
    const st=state[k];
    if(st.attempts===0)scores.attempted++;
    st.attempts++;
    if(correct){
      if(st.attempts===1)scores.correct++;
      st.done=true;showFeedback("","correct");updateStats();renderQ();
    } else {
      st.wrongChoices.push(chosen);
      if(st.attempts>=2){
        st.done=true;
        showFeedback("✗ Incorrect. See the full worked solution below.","wrong");
        updateStats();renderQ();
      } else {
        showFeedback("✗ Not quite — try once more! Use 'how to solve' for a hint.","tryagain");
        updateStats();
        if(q.type==="mc"){
          document.querySelectorAll(".obtn").forEach(b=>{
            if(st.wrongChoices.includes(q.options[parseInt(b.dataset.opt)])){b.classList.add("dwrong");b.disabled=true;}
          });
        } else {const inp=document.getElementById("free-in");if(inp){inp.value="";inp.focus();}}
      }
    }
  }

  if(q.type==="mc"&&!s.done){
    document.querySelectorAll(".obtn:not([disabled])").forEach(btn=>{
      btn.onclick=()=>handleAnswer(q.options[parseInt(btn.dataset.opt)],q.options[parseInt(btn.dataset.opt)]===q.answer);
    });
  }

  if(q.type==="free"&&!s.done){
    const sub=document.getElementById("btn-submit"),inp=document.getElementById("free-in");
    function tryFree(){
      const val=inp.value.trim();if(!val)return;
      if(!state[k])state[k]={attempts:0,done:false,wrongChoices:[],feedbackMsg:"",feedbackColor:""};
      state[k].lastVal=val;handleAnswer(val,checkFree(val,q.answer));
    }
    if(sub)sub.onclick=tryFree;
    inp.onkeydown=e=>{if(e.key==="Enter")tryFree();};
  }
}

function buildFilters(){
  const f=document.getElementById("filters");
  SECTIONS.forEach(s=>{
    const b=document.createElement("button");
    b.className="fbtn"+(s===activeFilter?" active":"");
    b.textContent=LABELS[s];
    b.onclick=()=>{
      activeFilter=s;filtered=s==="All"?[...Q]:Q.filter(q=>q.section===s);
      current=0;roundNum=1;scores={correct:0,attempted:0};
      document.getElementById("banner").style.display="none";
      document.getElementById("btn-redo").style.display="none";
      document.querySelectorAll(".fbtn").forEach(x=>x.classList.remove("active"));
      b.classList.add("active");showHistory();renderQ();updateStats();
    };
    f.appendChild(b);
  });
}

document.getElementById("btn-prev").onclick=()=>{if(current>0){current--;renderQ();}};
document.getElementById("btn-next").onclick=()=>{if(current<filtered.length-1){current++;renderQ();}};
document.getElementById("btn-rand").onclick=()=>{current=Math.floor(Math.random()*filtered.length);renderQ();};
document.getElementById("btn-redo").onclick=()=>newRound();

buildFilters();renderQ();updateStats();
</script>
</body>
</html>
