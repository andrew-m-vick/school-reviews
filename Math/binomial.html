<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Binomial Probability — Math 1324</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: #f5f4f0; color: #1a1a1a; min-height: 100vh; padding: 2rem 1rem; }
    .back-link { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: #888; text-decoration: none; margin-bottom: 1.25rem; }
    .back-link:hover { color: #1a1a1a; }
    #app { max-width: 720px; margin: 0 auto; background: #fff; border-radius: 12px; border: 1px solid #d8d6ce; padding: 2rem; }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
    .subtitle { font-size: 14px; color: #888; margin-bottom: 1.5rem; }
    .score-row { display: flex; gap: 10px; margin-bottom: 1.25rem; }
    .scard { flex: 1; background: #f0eeea; border-radius: 8px; padding: 0.75rem 1rem; }
    .slabel { font-size: 11px; color: #888; margin-bottom: 3px; }
    .sval { font-size: 22px; font-weight: 600; }
    .pbar-bg { height: 5px; background: #e2e0d8; border-radius: 999px; margin-bottom: 1.5rem; overflow: hidden; }
    .pbar-fill { height: 100%; background: #1D9E75; border-radius: 999px; transition: width 0.4s; }
    .banner { background: #EAF3DE; border: 1px solid #97C459; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1.25rem; display: none; }
    .banner h3 { font-size: 15px; font-weight: 600; color: #27500A; margin-bottom: 4px; }
    .banner p { font-size: 13px; color: #27500A; opacity: 0.9; }
    .qcard { background: #fff; border: 1px solid #d8d6ce; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
    .qtag { font-size: 11px; font-weight: 500; color: #1A6B40; background: #E8F5EE; padding: 3px 9px; border-radius: 8px; display: inline-block; margin-bottom: 0.75rem; }
    .atag { font-size: 11px; color: #888; margin-left: 8px; }
    .qtext { font-size: 17px; font-weight: 500; color: #1a1a1a; line-height: 1.55; margin-bottom: 1.25rem; }
    .options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 1rem; }
    .obtn { background: #f7f6f2; border: 1px solid #c8c6be; border-radius: 12px; padding: 0.85rem 1rem; font-size: 15px; font-family: inherit; color: #1a1a1a; text-align: left; cursor: pointer; transition: background 0.15s, border-color 0.15s; line-height: 1.45; }
    .obtn:hover:not(:disabled) { background: #eceae4; border-color: #a8a69e; }
    .obtn.reveal-correct { background: #EAF3DE; border-color: #639922; color: #27500A; }
    .obtn.dwrong { opacity: 0.35; cursor: not-allowed; text-decoration: line-through; }
    .free-row { display: flex; gap: 8px; margin-bottom: 1rem; }
    .free-row input { flex: 1; font-size: 14px; font-family: inherit; padding: 10px 14px; border: 1px solid #d8d6ce; border-radius: 8px; background: #fff; color: #1a1a1a; outline: none; transition: border-color 0.15s; }
    .free-row input:focus { border-color: #1D9E75; }
    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
    .abtn { border: 1px solid #d8d6ce; border-radius: 8px; padding: 8px 14px; font-size: 13px; font-family: inherit; cursor: pointer; background: #fff; color: #1a1a1a; transition: background 0.15s; }
    .abtn:hover { background: #f0eeea; }
    .abtn.redo { border-color: #1D9E75; color: #1D9E75; font-weight: 500; }
    .abtn.redo:hover { background: #E8F5EE; }
    #btn-hint { background: #EEEDFE; border-color: #c4b5fd; color: #534AB7; font-weight: 500; }
    #btn-hint:hover { background: #e4e2fe; }
    .hint-box { margin-top: 1rem; background: #EEEDFE; border: 1px solid #c4b5fd; border-radius: 12px; padding: 1.25rem; display: none; }
    .hint-box h4 { font-size: 13px; font-weight: 600; color: #534AB7; margin-bottom: 0.75rem; }
    .hint-concept { font-size: 13px; color: #534AB7; line-height: 1.7; margin-bottom: 0.75rem; }
    .hint-steps { list-style: none; padding: 0; counter-reset: step; }
    .hint-steps li { font-size: 13px; color: #534AB7; line-height: 1.7; padding: 4px 0 4px 20px; position: relative; }
    .hint-steps li::before { content: counter(step); counter-increment: step; position: absolute; left: 0; font-weight: 600; color: #534AB7; }
    .hint-note { font-size: 12px; color: #534AB7; opacity: 0.8; margin-top: 0.5rem; font-style: italic; }
    .solution-box { margin-top: 1rem; background: #FCEBEB; border: 1px solid #F09595; border-radius: 12px; padding: 1.25rem; display: none; }
    .solution-box h4 { font-size: 13px; font-weight: 600; color: #791F1F; margin-bottom: 0.75rem; }
    .sol-step { font-size: 13px; color: #791F1F; line-height: 1.8; padding: 2px 0; }
    .sol-answer { margin-top: 0.75rem; font-size: 14px; font-weight: 600; color: #791F1F; background: rgba(255,255,255,0.5); border-radius: 8px; padding: 8px 12px; }
    .feedback { margin-top: 0.75rem; font-size: 13px; font-weight: 500; display: none; }
    .history-panel { margin-bottom: 1.25rem; display: none; }
    .history-label { font-size: 11px; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
    .history-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .hchip { font-size: 12px; padding: 4px 12px; border-radius: 999px; border: 1px solid #e2e0d8; background: #f0eeea; color: #888; }
    .hchip.best { border-color: #1D9E75; color: #1D9E75; font-weight: 500; }
    .nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 1rem; flex-wrap: wrap; gap: 8px; }
    .qcounter { font-size: 13px; color: #888; }
    .nav-btns { display: flex; gap: 8px; flex-wrap: wrap; }
    @media (max-width: 500px) { #app { padding: 1.25rem; } .sval { font-size: 18px; } h1 { font-size: 18px; } }
  </style>
</head>
<body>
<a class="back-link" href="index.html">← Math 1324</a>
<div id="app">
  <h1>Binomial Probability</h1>
  <p class="subtitle">Binomial formula, expected value E(x) = np, and the 4 conditions</p>
  <div class="history-panel" id="history-panel">
    <div class="history-label">attempt history</div>
    <div class="history-row" id="history-row"></div>
  </div>
  <div class="score-row">
    <div class="scard"><div class="slabel">correct</div><div class="sval" id="s-correct">0</div></div>
    <div class="scard"><div class="slabel">attempted</div><div class="sval" id="s-attempted">0</div></div>
    <div class="scard"><div class="slabel">accuracy</div><div class="sval" id="s-pct">—</div></div>
    <div class="scard"><div class="slabel">round</div><div class="sval" id="s-round">1</div></div>
  </div>
  <div class="pbar-bg"><div class="pbar-fill" id="prog" style="width:0%"></div></div>
  <div class="banner" id="banner"><h3 id="banner-title"></h3><p id="banner-msg"></p></div>
  <div id="q-area"></div>
  <div class="nav-row">
    <span class="qcounter" id="qcounter"></span>
    <div class="nav-btns">
      <button class="abtn" id="btn-prev">← prev</button>
      <button class="abtn" id="btn-next">next →</button>
      <button class="abtn" id="btn-rand">random</button>
      <button class="abtn redo" id="btn-redo" style="display:none">↺ new round</button>
    </div>
  </div>
</div>
<script>
const Q = [
  {
    tag:"§9.4 Binomial",
    q:"Which formula gives the expected value of a binomial distribution?",
    type:"mc", options:["E(x) = n/p","E(x) = np","E(x) = n + p","E(x) = p/n"], answer:"E(x) = np",
    hint:{
      concept:"A binomial distribution with n trials each succeeding with probability p has a shortcut formula for expected value.",
      steps:["For a binomial experiment with n fixed trials and success probability p","The expected number of successes is simply n × p","Example: 100 coin flips with p=0.5 → expect how many heads?"],
      note:"This ONLY works for binomial distributions."
    },
    solution:{steps:["E(x) = n × p","That's the binomial expected value formula."], answer:"E(x) = np"}
  },
  {
    tag:"§9.4 Binomial",
    q:"43% of females take on debt. n=9 selected. What is P(x=0)?",
    type:"mc", options:["0.006","0.010","0.043","0.570"], answer:"0.006",
    hint:{
      concept:"Binomial formula: P(x=k) = C(n,k) × pᵏ × (1−p)ⁿ⁻ᵏ. For x=0, this simplifies nicely.",
      steps:["P(x=0) = C(9,0) × (0.43)⁰ × (0.57)⁹","C(9,0) = ? and (0.43)⁰ = ? (anything to the 0 power)","You need (0.57)⁹ — compute step by step: 0.57²≈0.3249, ×0.57 repeatedly","Multiply everything together."],
      note:"P(x=0) = (1−p)ⁿ always — all n trials must be failures."
    },
    solution:{steps:["C(9,0)=1, (0.43)⁰=1, (0.57)⁹≈0.00636","P(x=0) ≈ 0.006"], answer:"0.006"}
  },
  {
    tag:"§9.4 Binomial",
    q:"7% of children live with father only. n=12. What is P(x=0)?",
    type:"mc", options:["0.419","0.381","0.070","0.930"], answer:"0.419",
    hint:{
      concept:"P(x=0) = (1−p)ⁿ — all n children must NOT be in the 'father only' category.",
      steps:["p = 0.07, so (1−p) = 0.93, n = 12","Calculate (0.93)¹²","Build up: (0.93)²≈0.8649, then (0.93)⁴, (0.93)⁸, (0.93)¹²"],
      note:"For x=0 in binomial, C(n,0)=1 and p⁰=1, so it's always just (1−p)ⁿ."
    },
    solution:{steps:["P(x=0) = (0.93)¹² ≈ 0.419"], answer:"0.419"}
  },
  {
    tag:"§9.4 Binomial",
    q:"6% of children live with father only. n=12. What is P(at least 3)?",
    type:"mc", options:["0.032","0.968","0.238","0.476"], answer:"0.032",
    hint:{
      concept:"'At least 3' means x ≥ 3. Use complement: P(x≥3) = 1 − [P(0) + P(1) + P(2)].",
      steps:["p=0.06, q=0.94, n=12","Calculate P(0) = (0.94)¹²","Calculate P(1) = C(12,1)(0.06)¹(0.94)¹¹","Calculate P(2) = C(12,2)(0.06)²(0.94)¹⁰","Sum P(0)+P(1)+P(2), then subtract from 1."],
      note:"Complement for 'at least k': P(x≥k) = 1 − P(x≤k−1). Almost always easier."
    },
    solution:{steps:["P(0)≈0.4759, P(1)≈0.3645, P(2)≈0.1280","Sum ≈ 0.9684","P(x≥3) = 1 − 0.9684 ≈ 0.032"], answer:"0.032"}
  },
  {
    tag:"§9.4 Binomial",
    q:"70% of voters favor Ms. Stein. n=300. What is E(x)?",
    type:"free", answer:"210",
    hint:{
      concept:"For binomial: E(x) = n × p. Direct multiplication.",
      steps:["n = 300, p = 0.70","E(x) = n × p = ?"]
    },
    solution:{steps:["E(x) = 300 × 0.70 = 210"], answer:"210"}
  },
  {
    tag:"§9.4 Binomial",
    q:"For a binomial experiment, which of these is NOT a required condition?",
    type:"mc", options:["Fixed number of trials","Each trial is independent","Outcomes are success or failure","Probability of success changes each trial"], answer:"Probability of success changes each trial",
    hint:{
      concept:"A binomial experiment has exactly 4 required conditions. One of these answer choices violates a condition rather than being a condition.",
      steps:["Condition 1: fixed number of trials n","Condition 2: each trial is independent","Condition 3: two outcomes per trial (success or failure)","Condition 4: probability of success p is CONSTANT across all trials","Which answer choice is the OPPOSITE of one of these conditions?"],
      note:"If any of the 4 conditions fails, you cannot use the binomial formula."
    },
    solution:{steps:["Condition 4 requires constant p.","'Probability changes each trial' violates that condition — it's the opposite of what's required.","Answer: Probability of success changes each trial"], answer:"Probability of success changes each trial"}
  }
];

let questions = Q;
let current = 0, roundNum = 1, history = [], state = {}, scores = { correct: 0, attempted: 0 };

function norm(s) { return s.toLowerCase().replace(/\s+/g, '').replace(/[{}]/g, ''); }
function checkFree(u, c) {
  const un = norm(u), cn = norm(c);
  if (un === cn) return true;
  const uN = parseFloat(u.replace(/,/g, '')), cN = parseFloat(c.replace(/,/g, ''));
  if (!isNaN(uN) && !isNaN(cN)) return Math.abs(uN - cN) < 0.005;
  return JSON.stringify(un.split(',').sort()) === JSON.stringify(cn.split(',').sort());
}
function key(i) { return roundNum + '||' + i; }
function done(i) { const s = state[key(i)]; return s && s.done; }
function allDone() { return questions.length > 0 && questions.every((_, i) => done(i)); }

function updateStats() {
  document.getElementById('s-correct').textContent = scores.correct;
  document.getElementById('s-attempted').textContent = scores.attempted;
  document.getElementById('s-pct').textContent = scores.attempted > 0 ? Math.round(scores.correct / scores.attempted * 100) + '%' : '—';
  document.getElementById('s-round').textContent = roundNum;
  const d = questions.filter((_, i) => done(i)).length;
  document.getElementById('prog').style.width = (questions.length ? Math.round(d / questions.length * 100) : 0) + '%';
  if (allDone()) {
    const pct = Math.round(scores.correct / scores.attempted * 100);
    if (!history.find(r => r.round === roundNum)) {
      history.push({ round: roundNum, correct: scores.correct, attempted: scores.attempted, pct });
      showHistory(); showBanner(pct);
      document.getElementById('btn-redo').style.display = 'inline-block';
    }
  }
}

function showHistory() {
  const panel = document.getElementById('history-panel'), row = document.getElementById('history-row');
  if (!history.length) { panel.style.display = 'none'; return; }
  panel.style.display = 'block'; row.innerHTML = '';
  const best = Math.max(...history.map(r => r.pct));
  history.forEach(r => {
    const c = document.createElement('span');
    c.className = 'hchip' + (r.pct === best ? ' best' : '');
    c.textContent = 'Round ' + r.round + ': ' + r.correct + '/' + r.attempted + ' (' + r.pct + '%)';
    row.appendChild(c);
  });
}

function showBanner(pct) {
  document.getElementById('banner').style.display = 'block';
  document.getElementById('banner-title').textContent = 'Section complete!';
  document.getElementById('banner-msg').textContent = pct === 100 ? 'Perfect! Start a new round to lock it in.' : pct >= 80 ? 'Great work — ' + pct + '%. One more round will cement it.' : pct >= 60 ? pct + '% — review the worked solutions, then retry.' : pct + '% — go through the hints carefully, then try again.';
}

function newRound() {
  roundNum++; scores = { correct: 0, attempted: 0 }; current = 0;
  document.getElementById('banner').style.display = 'none';
  document.getElementById('btn-redo').style.display = 'none';
  renderQ(); updateStats(); showHistory();
}

function renderQ() {
  const q = questions[current];
  const k = key(current);
  const s = state[k] || { attempts: 0, done: false, wrongChoices: [], feedbackMsg: '', feedbackColor: '' };
  document.getElementById('qcounter').textContent = (current + 1) + ' / ' + questions.length;

  let attTag = s.attempts > 0 ? `<span class="atag">(${s.attempts} attempt${s.attempts > 1 ? 's' : ''})</span>` : '';
  let html = `<div class="qcard">
    <div><span class="qtag">${q.tag}</span>${attTag}</div>
    <p class="qtext">${q.q}</p>`;

  if (q.type === 'mc') {
    html += `<div class="options">`;
    q.options.forEach((opt, i) => {
      let cls = 'obtn', dis = '';
      if (s.done) { if (opt === q.answer) cls += ' reveal-correct'; else if (s.wrongChoices.includes(opt)) cls += ' dwrong'; dis = 'disabled'; }
      else if (s.wrongChoices.includes(opt)) { cls += ' dwrong'; dis = 'disabled'; }
      html += `<button class="${cls}" data-opt="${i}" ${dis}>${opt}</button>`;
    });
    html += `</div>`;
  } else {
    html += `<div class="free-row">
      <input type="text" id="free-in" placeholder="Type your answer…" ${s.done ? 'disabled' : ''} value="${s.done ? (s.lastVal || '') : ''}">
      ${!s.done ? `<button class="abtn" id="btn-submit">check</button>` : ''}
    </div>`;
  }

  html += `<div class="btn-row"><button class="abtn" id="btn-hint">💡 how to solve</button></div>`;

  const h = q.hint;
  html += `<div class="hint-box" id="hint-box">
    <h4>💡 How to Approach This Problem</h4>
    <div class="hint-concept"><strong>Key Concept:</strong> ${h.concept}</div>
    <strong style="font-size:13px;color:#534AB7;">Step-by-step approach:</strong>
    <ol class="hint-steps">`;
  h.steps.forEach(step => { html += `<li>${step}</li>`; });
  html += `</ol>`;
  if (h.note) html += `<div class="hint-note">💬 ${h.note}</div>`;
  html += `</div>`;

  if (s.done && s.wrongChoices.length >= 2) {
    const sol = q.solution;
    html += `<div class="solution-box" style="display:block"><h4>📝 Full Worked Solution</h4>`;
    sol.steps.forEach(step => { html += `<div class="sol-step">${step}</div>`; });
    html += `<div class="sol-answer">✓ Answer: ${q.answer}</div></div>`;
  }

  html += `<div class="feedback" id="feedback" style="display:${s.feedbackMsg ? 'block' : 'none'};color:${s.feedbackColor || 'inherit'}">${s.feedbackMsg || ''}</div>`;
  html += `</div>`;
  document.getElementById('q-area').innerHTML = html;

  document.getElementById('btn-hint').onclick = () => {
    const hb = document.getElementById('hint-box');
    hb.style.display = hb.style.display === 'block' ? 'none' : 'block';
  };

  function showFeedback(msg, type) {
    const fb = document.getElementById('feedback');
    fb.style.display = 'block';
    const colors = { correct: '#27500A', tryagain: '#854f0b', wrong: '#791F1F' };
    fb.style.color = colors[type];
    fb.textContent = type === 'correct' ? '✓ Correct! Well done.' : msg;
    state[k].feedbackMsg = fb.textContent; state[k].feedbackColor = fb.style.color;
  }

  function handleAnswer(chosen, correct) {
    if (!state[k]) state[k] = { attempts: 0, done: false, wrongChoices: [], feedbackMsg: '', feedbackColor: '' };
    const st = state[k];
    if (st.attempts === 0) scores.attempted++;
    st.attempts++;
    if (correct) {
      if (st.attempts === 1) scores.correct++;
      st.done = true; showFeedback('', 'correct'); updateStats(); renderQ();
    } else {
      st.wrongChoices.push(chosen);
      if (st.attempts >= 2) {
        st.done = true;
        showFeedback('✗ Incorrect. See the full worked solution below.', 'wrong');
        updateStats(); renderQ();
      } else {
        showFeedback('✗ Not quite — try once more. Use the hint if you need a push.', 'tryagain');
        updateStats();
        if (q.type === 'mc') {
          document.querySelectorAll('.obtn').forEach(b => {
            if (st.wrongChoices.includes(q.options[parseInt(b.dataset.opt)])) { b.classList.add('dwrong'); b.disabled = true; }
          });
        } else { const inp = document.getElementById('free-in'); if (inp) { inp.value = ''; inp.focus(); } }
      }
    }
  }

  if (q.type === 'mc' && !s.done) {
    document.querySelectorAll('.obtn:not([disabled])').forEach(btn => {
      btn.onclick = () => handleAnswer(q.options[parseInt(btn.dataset.opt)], q.options[parseInt(btn.dataset.opt)] === q.answer);
    });
  }
  if (q.type === 'free' && !s.done) {
    const sub = document.getElementById('btn-submit'), inp = document.getElementById('free-in');
    function tryFree() {
      const val = inp.value.trim(); if (!val) return;
      if (!state[k]) state[k] = { attempts: 0, done: false, wrongChoices: [], feedbackMsg: '', feedbackColor: '' };
      state[k].lastVal = val; handleAnswer(val, checkFree(val, q.answer));
    }
    if (sub) sub.onclick = tryFree;
    inp.onkeydown = e => { if (e.key === 'Enter') tryFree(); };
  }
}

document.getElementById('btn-prev').onclick = () => { if (current > 0) { current--; renderQ(); } };
document.getElementById('btn-next').onclick = () => { if (current < questions.length - 1) { current++; renderQ(); } };
document.getElementById('btn-rand').onclick = () => { current = Math.floor(Math.random() * questions.length); renderQ(); };
document.getElementById('btn-redo').onclick = () => newRound();
renderQ(); updateStats();
</script>
</body>
</html>
