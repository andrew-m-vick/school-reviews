const SECTIONS = ["All","2.1 Graph","2.2 Equations of Lines","3.4 Quadratic Functions","3.6 Rational Functions","6.1 Systems (2×2)","6.2 Larger Systems","6.3 Applications","6.4 Matrix Operations","6.5 Matrix Products"];

let activeSection = "All";
let questions = [...ALL_Q];
let current = 0, roundNum = 1, history = [], state = {}, scores = { correct: 0, attempted: 0 };

function buildFilters() {
  const container = document.getElementById('filters');
  SECTIONS.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'fbtn' + (s === activeSection ? ' active' : '');
    btn.textContent = s;
    btn.onclick = () => {
      activeSection = s;
      questions = s === 'All' ? [...ALL_Q] : ALL_Q.filter(q => q.tag === s);
      current = 0; scores = { correct: 0, attempted: 0 }; state = {}; roundNum = 1;
      document.getElementById('banner').style.display = 'none';
      document.getElementById('btn-redo').style.display = 'none';
      document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderQ(); updateStats(); showHistory();
    };
    container.appendChild(btn);
  });
}

function key(i) { return activeSection + '||' + roundNum + '||' + i; }
function done(i) { const s = state[key(i)]; return s && s.done; }
function allDone() { return questions.length > 0 && questions.every((_, i) => done(i)); }

function updateStats() {
  document.getElementById('s-correct').textContent = scores.correct;
  document.getElementById('s-attempted').textContent = scores.attempted;
  document.getElementById('s-pct').textContent = scores.attempted > 0 ? Math.round(scores.correct / scores.attempted * 100) + '%' : '—';
  document.getElementById('s-round').textContent = roundNum;
  const d = questions.filter((_, i) => done(i)).length;
  document.getElementById('prog').style.width = (questions.length ? Math.round(d / questions.length * 100) : 0) + '%';
  if (allDone()) {
    const pct = Math.round(scores.correct / scores.attempted * 100);
    if (!history.find(r => r.round === roundNum && r.section === activeSection)) {
      history.push({ round: roundNum, correct: scores.correct, attempted: scores.attempted, pct, section: activeSection });
      showHistory(); showBanner(pct);
      document.getElementById('btn-redo').style.display = 'inline-block';
    }
  }
}

function showHistory() {
  const panel = document.getElementById('history-panel'), row = document.getElementById('history-row');
  const relevant = history.filter(r => r.section === activeSection);
  if (!relevant.length) { panel.style.display = 'none'; return; }
  panel.style.display = 'block'; row.innerHTML = '';
  const best = Math.max(...relevant.map(r => r.pct));
  relevant.forEach(r => {
    const c = document.createElement('span');
    c.className = 'hchip' + (r.pct === best ? ' best' : '');
    c.textContent = 'Round ' + r.round + ': ' + r.correct + '/' + r.attempted + ' (' + r.pct + '%)';
    row.appendChild(c);
  });
}

function showBanner(pct) {
  document.getElementById('banner').style.display = 'block';
  document.getElementById('banner-title').textContent = 'Section complete!';
  document.getElementById('banner-msg').textContent = pct === 100 ? 'Perfect score! Run it again to lock it in.' : pct >= 80 ? pct + '% — strong work. One more round will cement it.' : pct >= 60 ? pct + '% — review the worked solutions, then retry.' : pct + '% — study the solution steps carefully before trying again.';
}

function newRound() {
  roundNum++; scores = { correct: 0, attempted: 0 }; current = 0;
  document.getElementById('banner').style.display = 'none';
  document.getElementById('btn-redo').style.display = 'none';
  renderQ(); updateStats(); showHistory();
}

function renderQ() {
  if (!questions.length) { document.getElementById('q-area').innerHTML = '<p style="color:#888;font-size:14px;padding:1rem 0;">No questions in this section.</p>'; return; }
  const q = questions[current];
  const k = key(current);
  const s = state[k] || { attempts: 0, done: false, wrongChoices: [], feedbackMsg: '', feedbackColor: '' };
  document.getElementById('qcounter').textContent = (current + 1) + ' / ' + questions.length;

  let attTag = s.attempts > 0 ? `<span class="atag">(${s.attempts} attempt${s.attempts > 1 ? 's' : ''})</span>` : '';
  let html = `<div class="qcard"><div><span class="qtag">${q.tag}</span>${attTag}</div><p class="qtext">${q.q.replace(/\n/g,'<br>')}</p><div class="options">`;
  q.options.forEach((opt, i) => {
    let cls = 'obtn', dis = '';
    if (s.done) { if (opt === q.answer) cls += ' reveal-correct'; else if (s.wrongChoices.includes(opt)) cls += ' dwrong'; dis = 'disabled'; }
    else if (s.wrongChoices.includes(opt)) { cls += ' dwrong'; dis = 'disabled'; }
    const optHtml = opt.includes('\n') ? opt.replace(/\n/g,'<br>') : opt;
    html += `<button class="${cls}" data-opt="${i}" ${dis}>${optHtml}</button>`;
  });
  html += `</div><div class="btn-row"><button class="abtn" id="btn-hint">💡 how to approach</button></div>`;
  const h = q.hint;
  html += `<div class="hint-box" id="hint-box"><h4>💡 How to Approach This</h4><div class="hint-concept"><strong>Key idea:</strong> ${h.concept}</div><strong style="font-size:13px;color:#0d5c3a;">Step by step:</strong><ol class="hint-steps">`;
  h.steps.forEach(step => { html += `<li>${step}</li>`; });
  html += `</ol>`;
  if (h.note) html += `<div class="hint-note">📝 ${h.note}</div>`;
  html += `</div>`;
  if (s.done && s.wrongChoices.length >= 2) {
    const sol = q.solution;
    html += `<div class="solution-box" style="display:block"><h4>📝 Full Solution</h4>`;
    sol.steps.forEach(step => { html += `<div class="sol-step">${step.replace(/\n/g,'<br>')}</div>`; });
    html += `<div class="sol-answer">✓ Answer: ${q.answer.replace(/\n/g,'<br>')}</div></div>`;
  }
  html += `<div class="feedback" id="feedback" style="display:${s.feedbackMsg ? 'block' : 'none'};color:${s.feedbackColor || 'inherit'}">${s.feedbackMsg || ''}</div>`;
  html += `</div>`;
  document.getElementById('q-area').innerHTML = html;

  document.getElementById('btn-hint').onclick = () => {
    const hb = document.getElementById('hint-box');
    hb.style.display = hb.style.display === 'block' ? 'none' : 'block';
  };

  function showFeedback(msg, type) {
    const fb = document.getElementById('feedback');
    fb.style.display = 'block';
    const colors = { correct: '#0d5c3a', tryagain: '#854f0b', wrong: '#791F1F' };
    fb.style.color = colors[type];
    fb.textContent = type === 'correct' ? '✓ Correct!' : msg;
    state[k].feedbackMsg = fb.textContent; state[k].feedbackColor = fb.style.color;
  }

  function handleAnswer(chosen, correct) {
    if (!state[k]) state[k] = { attempts: 0, done: false, wrongChoices: [], feedbackMsg: '', feedbackColor: '' };
    const st = state[k];
    if (st.attempts === 0) scores.attempted++;
    st.attempts++;
    if (correct) {
      if (st.attempts === 1) scores.correct++;
      st.done = true; showFeedback('', 'correct'); updateStats(); renderQ();
    } else {
      st.wrongChoices.push(chosen);
      if (st.attempts >= 2) {
        st.done = true;
        showFeedback('✗ Incorrect. See the full solution below.', 'wrong');
        updateStats(); renderQ();
      } else {
        showFeedback('✗ Not quite — one more try. Use the hint if needed.', 'tryagain');
        updateStats();
        document.querySelectorAll('.obtn').forEach(b => {
          if (st.wrongChoices.includes(q.options[parseInt(b.dataset.opt)])) { b.classList.add('dwrong'); b.disabled = true; }
        });
      }
    }
  }

  if (!s.done) {
    document.querySelectorAll('.obtn:not([disabled])').forEach(btn => {
      btn.onclick = () => handleAnswer(q.options[parseInt(btn.dataset.opt)], q.options[parseInt(btn.dataset.opt)] === q.answer);
    });
  }
}

document.getElementById('btn-prev').onclick = () => { if (current > 0) { current--; renderQ(); } };
document.getElementById('btn-next').onclick = () => { if (current < questions.length - 1) { current++; renderQ(); } };
document.getElementById('btn-rand').onclick = () => { current = Math.floor(Math.random() * questions.length); renderQ(); };
document.getElementById('btn-redo').onclick = () => newRound();

buildFilters(); renderQ(); updateStats();
</script>
</body>
</html>
